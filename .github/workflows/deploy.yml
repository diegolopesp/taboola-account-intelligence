name: Deploy to Netlify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Netlify
        run: |
          zip site.zip index.html netlify.toml
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" \
            -H "Content-Type: application/zip" \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            --data-binary @site.zip)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deploy failed with HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi
          echo "$BODY" | python3 -c "import sys,json; r=json.load(sys.stdin); print('✅ Deploy state:', r.get('state',''), '| URL:', r.get('deploy_ssl_url',''))"
