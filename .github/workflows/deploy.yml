name: Deploy to Netlify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Netlify
        run: |
          zip site.zip index.html
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" \
            -H "Content-Type: application/zip" \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            --data-binary @site.zip \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print('✅ Deploy:', r.get('deploy_ssl_url', r.get('state','')))"
